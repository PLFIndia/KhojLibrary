<!doctype html>
<!--
  Pitaka library viewer (D12).
  Single self-contained file: no CDN dependencies, no build step,
  no runtime fetch beyond the sibling books.json.

  Bundled with the app at app/src/main/assets/publish/index.html
  and uploaded verbatim to the user's GitHub repo on publish.

  viewerVersion: 3
    v3: F-09 — Content-Security-Policy meta added; image origins
         restricted to same-origin, data:, and the OpenLibrary /
         Google Books cover hosts. Mirrors CoverUrlAllowList.kt.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<!--
  F-09: Content-Security-Policy.
  default-src 'self' is the catch-all deny; everything else is an
  explicit grant. img-src mirrors CoverUrlAllowList.ALLOWED_HOSTS
  in the Kotlin publisher; any drift between the two is caught by
  PublishViewerCspTest. 'unsafe-inline' on script/style is honest:
  the viewer is a single self-contained file built around inline
  <style> and <script>. It does not protect against XSS in this
  document, but the F-09 threat is cross-origin image exfiltration,
  which img-src handles regardless of script-src.
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https://covers.openlibrary.org https://books.google.com https://books.googleusercontent.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
<title>Khoj Library</title>
<style>
  :root {
    --saffron-50: #fff1e6;
    --saffron-100: #fac7a7;
    --saffron-400: #e25822;
    --saffron-700: #7e2706;
    --ink-50: #fffaf5;
    --ink-900: #1f1209;
    --grey-30: #e5e5e5;
    --grey-70: #424242;
    --bg: var(--ink-50);
    --bg-alt: var(--saffron-50);
    --fg: var(--ink-900);
    --fg-muted: var(--grey-70);
    --accent: var(--saffron-400);
    --border: var(--grey-30);
    --shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  [data-theme="dark"] {
    --bg: #1a1208;
    --bg-alt: #2a1c10;
    --fg: var(--ink-50);
    --fg-muted: var(--saffron-100);
    --border: #3a2a1a;
    --shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
  }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  h1 { margin: 0 0 12px; font-size: 22px; font-weight: 500; color: var(--accent); display: flex; align-items: center; gap: 10px; }
  h1 .logo { width: 28px; height: 28px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
  /* Optional library contact line (rendered only when the publisher set
     at least one of location/email/phone). Sits under the title, above the
     controls. Muted, tappable links; wraps on narrow screens. */
  .contact {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 16px;
    margin: -4px 0 12px;
    font-size: 13px;
  }
  .contact .contact-item {
    color: var(--fg-muted);
    text-decoration: none;
    white-space: nowrap;
  }
  .contact .contact-item:hover { color: var(--accent); text-decoration: underline; }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  input[type="search"], select, button {
    font: inherit;
    border: 1px solid var(--border);
    background: var(--bg-alt);
    color: var(--fg);
    padding: 6px 10px;
    border-radius: 6px;
  }
  input[type="search"] { flex: 1; min-width: 180px; }
  button { cursor: pointer; }
  button.active { background: var(--accent); color: var(--ink-50); border-color: var(--accent); }
  .meta { color: var(--fg-muted); font-size: 12px; margin: 8px 0 0; }
  main { padding: 16px 20px 48px; }

  /* Layouts */
  .layout-table table { width: 100%; border-collapse: collapse; }
  .layout-table th, .layout-table td {
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .layout-table th { font-weight: 600; color: var(--fg-muted); }

  .layout-card .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .layout-card .card {
    border: 1px solid var(--border);
    background: var(--bg-alt);
    border-radius: 8px;
    padding: 12px;
    box-shadow: var(--shadow);
  }
  .layout-card .card h3 { margin: 0 0 4px; font-size: 16px; }
  .layout-card .card .author { color: var(--fg-muted); font-size: 14px; }
  .layout-card .card .row { font-size: 12px; color: var(--fg-muted); margin-top: 4px; }

  .layout-grid .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
  }
  .layout-grid .grid figure {
    margin: 0;
    text-align: center;
  }
  .layout-grid .grid img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    border-radius: 4px;
    background: var(--bg-alt);
    border: 1px solid var(--border);
  }
  .layout-grid .grid figcaption {
    font-size: 12px;
    color: var(--fg-muted);
    margin-top: 4px;
    overflow-wrap: anywhere;
  }
  .layout-grid .grid .title { color: var(--fg); }

  .empty {
    color: var(--fg-muted);
    font-size: 14px;
    margin: 32px 0;
    text-align: center;
  }
  .error {
    color: #b00020;
    margin: 32px 0;
    text-align: center;
  }
</style>
</head>
<body>

    <img class="logo" id="logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAAEACAIAAADTED8xAAAAA3NCSVQICAjb4U/gAAAAAXNSR0IArs4c6QAAC6pJREFUeJzt3cuPHFcVx/HfOfdW94zHduIkOEiQBAUhxCpBSGyIxGPHCnas+BcQfwESygIJiQVsIrFiyyYIRQghIViyYhGQeEgoPDYoiYVjZ8Yz3VX3HhaN43ZsM13TXVWnfX4feRFN+lFTU9/uel8xMxBFpVNPANGUGACFxgAoNAZAoTEACo0BUGgMgEJjABQaA6DQGACFxgAoNAZAoTEACo0BUGgMgEJjABQaA6DQGACFxgAoNAZAoTEACo0BUGgMgEJjABQaA6DQGACFxgAoNAZAoTEACo0BUGgMgEJjABQaA6DQGACFxgAoNAZAoTEACo0BUGgMgEJjABQaA6DQGACFxgAoNAZAoTEACo0BUGgMgEJjABQaA6DQGACFxgAoNAZAoTEACo0BUGgMgEJjABQaA6DQGACFxgAoNAZAoTEACo0BUGgMgEJjABQaA6DQGACFxgAoNAZAoTEACo0BUGgMgELLU08AAJx1Zz98/c/XddaqIM1LqaofLtOsAhDRtf8WAFKl6tkXXv7kpz9aZgdH576XWYVUWeRFc5rksNd0Gmpj9aTqgb6f9Ilez91Ea2flnZ+Wd27U5mauzb3/IWltIgwARB6YtoWhmedGnv9qmr98/pvVYqYQM6li2y4GZoa7f5Edk9JBm2Jtqo3sfnF1EcCPfvaX7/zkzqxdLprjy8sDEan13iK+mrn3EQGgIgBay5Cz6/q7N3/1jdkG7yWmVd63dPV7r/3+x6+f9ppOQ56V7kzlSP/91q+/2eu5m2gWBzfe/Pmz+g+k47K2MNV6bw6sPhpW82edQGGzanZy81/XPv/aue9lpuW9N27//ZdN0apnO/oNdi9XaXOXqhx94uv4yNd2//o7f8ULeAbNvM2z9iijtHkJAOm859wlBWZX5eyZw3J5k2eZQKCW6rvHT52kG72m06ALyW2ypna9nrihOmvl0i05O66laWz903Tt+7A84rlyCnRiNtcPt/FwYjf/9sbTp7/Q7qhIc/7jJ6JVDCr59Nafnnzyi49pAK3qYnacULRqU/utlogsF/lmwX8EZZNfxwRaD4FWpINt3NmKLqvMzdJ96ye7Y6JajlAu1eYUsva9Z+dvqpmImYih1Y3WQ0xqU5J2R53OxTZrZgpts9D2WtIbyO8O8fouAjBtLp3Nu2bZ1MOq/T5cxRqg1nql6EZriGJdJzlbqlr6rrFqbcSAtCilZzkbvr4lAUSLqUnt9xZadJnLvFXd9NszQ08MyaRTDLDuviNak+gdK9csDzKR3AtEobkIwGyYHQj/9y0v/I4i8sBWOe0rFwEQTcVFAKYwEQNstK8BkYfsXT1PRYKeoZvro/bFbMkets+XhuQigFqNf3iahIsARMbeBNhmG2BAMvq2UHguAiCaiosA1CAGAcbbvXKhbQBFQT1AXtTNj1SPxQSzDiUh+T2o5ZGLAIim4iKA/VrxNRtvZ1VftVZN7r6dPHMRANFUXARQYCYY9TjAhayOA2g9FAxyNug2BHWZUlOb1txNm2cuAiCaiosARDD2cbAtjgOYGdyePmk8pNiPiwCIpuLiegCpELPVcYCRNgO2OA5g+cx6nqw/AoPOSimN5g2ungEg1Y5eevW922+lWiv6XYQ0plTM0tLk4PKl54Z4fRcB0Pi6VOTwY5fnL0gV63kR0piyaZWuqBXkIS7D8xLAHh0KeDyuB2i6DC2QgmwY5grPXUmYpdUcH2AZ8RIAjazLrUAFKjBseB39FAwt8L+rIWWAM1BcBDDBXqAt+DwSLIZlxrxF2Wy/RobrT/0PCOaDvj73AlFoLgIwe/BOZ4O/5R5tddBwXARANJWoAWxxTbCUAxnomuBtSIUlWAL2Z3PKg     <span>Khoj Library</span>
  </h1>
  <div class="contact"><a class="contact-item" href="https://www.google.com/maps/search/?api=1&amp;query=6070%2C%20G-Block%2C%20Aerocity%2C%20Mohali" target="_blank" rel="noopener noreferrer">📍 6070, G-Block, Aerocity, Mohali</a></div>
  <div class="controls">
    <input id="q" type="search" placeholder="Search title, author, ISBN" autocomplete="off" />
    <select id="sort">
      <option value="addedDate">Recently added</option>
      <option value="title">Title</option>
      <option value="author">Author</option>
      <option value="publishedYear">Year published</option>
    </select>
    <button data-layout="table" class="active">Table</button>
    <button data-layout="card">Cards</button>
    <button data-layout="grid">Covers</button>
    <button id="theme" title="Toggle dark mode">🌗</button>
  </div>
  <p class="meta" id="meta">Loading…</p>
</header>
<main id="root"></main>

<script>
  const $ = (s) => document.querySelector(s);
  const root = $("#root");
  const q = $("#q");
  const sortEl = $("#sort");
  const meta = $("#meta");
  const theme = $("#theme");

  // ---- Theming ----
  const THEME_KEY = "pitaka-theme";
  function applyTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    localStorage.setItem(THEME_KEY, t);
  }
  applyTheme(localStorage.getItem(THEME_KEY) || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
  theme.addEventListener("click", () => {
    applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
  });

  // ---- Layout switcher ----
  let layout = "table";
  document.querySelectorAll("button[data-layout]").forEach((b) => {
    b.addEventListener("click", () => {
      layout = b.dataset.layout;
      document.querySelectorAll("button[data-layout]").forEach((x) => x.classList.toggle("active", x === b));
      render();
    });
  });
  q.addEventListener("input", render);
  sortEl.addEventListener("change", render);

  // ---- Data ----
  let books = [];
  let loadError = null;

  async function load() {
    try {
      const res = await fetch("books.json", { cache: "no-cache" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (typeof data.schemaVersion !== "number") {
        throw new Error("Missing schemaVersion in books.json");
      }
      if (data.schemaVersion > 1) {
        meta.textContent = "This file was created by a newer Pitaka. Re-publish from your phone to update the viewer.";
      }
      books = Array.isArray(data.books) ? data.books : [];
      render();
    } catch (e) {
      loadError = e.message || String(e);
      root.innerHTML = '<div class="error">Failed to load books.json: ' + escape(loadError) + "</div>";
    }
  }

  function escape(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[c]));
  }

  function filterAndSort() {
    const needle = q.value.trim().toLowerCase();
    const sortKey = sortEl.value;
    let out = books.slice();
    if (needle) {
      out = out.filter((b) => {
        const t = (b.title || "").toLowerCase();
        const tt = (b.titleTransliteration || "").toLowerCase();
        const a = (b.author || "").toLowerCase();
        const i = (b.isbn || "").toLowerCase();
        return t.indexOf(needle) >= 0 || tt.indexOf(needle) >= 0 || a.indexOf(needle) >= 0 || i.indexOf(needle) >= 0;
      });
    }
    out.sort((a, b) => {
      const av = (a[sortKey] == null) ? "" : a[sortKey];
      const bv = (b[sortKey] == null) ? "" : b[sortKey];
      if (sortKey === "addedDate" || sortKey === "publishedYear") {
        // numeric desc
        return (Number(bv) || 0) - (Number(av) || 0);
      }
      return String(av).localeCompare(String(bv));
    });
    return out;
  }

  function render() {
    if (loadError) return;
    const filtered = filterAndSort();
    meta.textContent = `${filtered.length} of ${books.length} book${books.length === 1 ? "" : "s"}`;
    if (filtered.length === 0) {
      root.innerHTML = '<div class="empty">No matches.</div>';
      return;
    }
    root.className = "layout-" + layout;
    if (layout === "table") root.innerHTML = renderTable(filtered);
    else if (layout === "card") root.innerHTML = renderCards(filtered);
    else if (layout === "grid") root.innerHTML = renderGrid(filtered);
  }

  function renderTable(list) {
    const rows = list.map((b) => `
      <tr>
        <td>${escape(b.title)}${b.titleTransliteration ? `<br><span class="meta">${escape(b.titleTransliteration)}</span>` : ""}</td>
        <td>${escape(b.author || "")}</td>
        <td>${escape(b.publishedYear || "")}</td>
        <td>${escape(b.isbn || "")}</td>
      </tr>
    `).join("");
    return `
      <table>
        <thead>
          <tr><th>Title</th><th>Author</th><th>Year</th><th>ISBN</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function renderCards(list) {
    return `<div class="cards">` + list.map((b) => `
      <div class="card">
        <h3>${escape(b.title)}</h3>
        ${b.titleTransliteration ? `<div class="row">${escape(b.titleTransliteration)}</div>` : ""}
        <div class="author">${escape(b.author || "")}</div>
        <div class="row">
          ${b.publishedYear ? escape(b.publishedYear) + " · " : ""}
          ${b.publisher ? escape(b.publisher) : ""}
        </div>
        <div class="row">${b.isbn ? "ISBN " + escape(b.isbn) : ""}</div>
      </div>
    `).join("") + `</div>`;
  }

  function renderGrid(list) {
    // Inline SVG placeholder so we never hit a broken image icon. Sized 2:3
    // book aspect, themed to bg-alt.
    const placeholder = "data:image/svg+xml;utf8," + encodeURIComponent(
      `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 90'>` +
      `<rect width='60' height='90' fill='#fac7a7' fill-opacity='0.25'/>` +
      `<path d='M20 28h20v6H20zM20 38h20v4H20zM20 46h20v4H20zM20 54h12v4H20z' fill='#e25822' fill-opacity='0.6'/>` +
      `</svg>`
    );
    return `<div class="grid">` + list.map((b) => `
      <figure>
        <img src="${b.coverUrl ? escape(b.coverUrl) : placeholder}" alt="${escape(b.title)}" loading="lazy" onerror="this.src='${placeholder}'" />
        <figcaption><span class="title">${escape(b.title)}</span></figcaption>
      </figure>
    `).join("") + `</div>`;
  }

  load();
</script>
</body>
</html>
